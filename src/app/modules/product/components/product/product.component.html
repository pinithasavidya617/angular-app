<div>
  <span>{{product?.name}}</span>
</div>
<div *ngIf="product?.currency === 'USD'; else localCurrency">
  <span>{{product?.price}}</span>
  <span>{{product?.currency}}</span>
</div>

<ng-template #localCurrency>
  <span>{{product?.currency}}</span>
  <span>{{product?.price}}</span>
</ng-template>
